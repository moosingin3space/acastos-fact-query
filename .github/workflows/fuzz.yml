name: Fuzz

# Manually triggered differential fuzzing of the ascent-jit engine. Runs the
# in-tree arbtest suite (stable toolchain) at a configurable budget via the
# Justfile's `fuzz-quick` recipe.
on:
  workflow_dispatch:
    inputs:
      budget_ms:
        description: "Per-property fuzz budget in milliseconds"
        required: false
        default: "30000"

jobs:
  fuzz:
    name: differential fuzz (arbtest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # The Justfile is the source of truth for how fuzzing runs.
      - name: Run differential fuzzing
        run: just fuzz-quick ${{ inputs.budget_ms }}
