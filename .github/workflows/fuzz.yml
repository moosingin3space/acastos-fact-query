name: Fuzz

# Manually triggered differential fuzzing of the ascent-jit engine. Runs the
# in-tree arbtest suite (stable toolchain) at a configurable budget via the
# Justfile's `fuzz-quick` recipe.
on:
  workflow_dispatch:
    inputs:
      budget_ms:
        description: "Per-property fuzz budget in milliseconds"
        required: false
        default: "30000"

jobs:
  fuzz:
    name: differential fuzz (arbtest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      # The Justfile is the source of truth for how fuzzing runs.
      - name: Run differential fuzzing
        run: just fuzz-quick ${{ inputs.budget_ms }}
